<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="520" height="400">
  <title>L'engagement KOMA — une relation de confiance</title>
  <desc>Poignée de main entre un client de la diaspora et un superviseur KOMA devant la maison livrée — illustration flat premium</desc>

  <!-- Fond -->
  <circle cx="260" cy="200" r="185" fill="#6BC0AA" opacity=".08"/>

  <!-- Maison livrée (arrière-plan) -->
  <g>
    <rect x="170" y="150" width="180" height="120" fill="#F2EDE4"/>
    <path d="M158 152 L260 88 L362 152Z" fill="#0E8FA8"/>
    <rect x="196" y="180" width="34" height="34" fill="#9FCBD6"/>
    <rect x="290" y="180" width="34" height="34" fill="#9FCBD6"/>
    <rect x="240" y="196" width="40" height="74" fill="#0B5468"/>
    <circle cx="272" cy="234" r="3" fill="#E0A33E"/>
    <!-- clé remise -->
    <g transform="translate(238 110) rotate(-12)">
      <circle cx="8" cy="8" r="7" fill="none" stroke="#E0A33E" stroke-width="3.5"/>
      <rect x="13" y="6" width="18" height="4" fill="#E0A33E"/>
      <rect x="26" y="6" width="3" height="8" fill="#E0A33E"/>
      <rect x="20" y="6" width="3" height="7" fill="#E0A33E"/>
    </g>
  </g>

  <!-- Sol -->
  <rect x="60" y="316" width="400" height="6" rx="3" fill="#C7D4D9"/>
  <!-- plantes -->
  <path d="M120 316 Q116 296 122 286 Q126 298 124 316Z" fill="#4E9F8A"/>
  <path d="M128 316 Q132 300 128 290 Q122 300 124 316Z" fill="#6BC0AA"/>
  <path d="M396 316 Q392 296 398 286 Q402 298 400 316Z" fill="#4E9F8A"/>

  <!-- ─── Client (gauche, costume) ─── -->
  <path d="M118 250 L114 322 L134 322 L140 256Z" fill="#1D2B33"/>
  <path d="M158 252 L164 322 L184 322 L176 256Z" fill="#1D2B33"/>
  <rect x="108" y="318" width="30" height="11" rx="5" fill="#15100A"/>
  <rect x="160" y="318" width="30" height="11" rx="5" fill="#15100A"/>
  <!-- veste -->
  <path d="M112 178 Q104 222 116 258 L178 258 Q188 220 182 178 Q164 162 146 162 Q128 162 112 178Z" fill="#15202A"/>
  <path d="M138 164 L146 184 L154 164Z" fill="#F6F8F9"/>
  <rect x="143" y="180" width="6" height="32" fill="#0E8FA8"/>
  <!-- tête -->
  <circle cx="147" cy="132" r="26" fill="#7A4A28"/>
  <path d="M123 126 Q123 102 147 100 Q171 102 171 126 Q168 110 147 109 Q126 110 123 126Z" fill="#15100A"/>
  <path d="M136 144 Q147 152 158 144" stroke="#2D1A0C" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <circle cx="137" cy="132" r="2.5" fill="#2D1A0C"/>
  <circle cx="157" cy="132" r="2.5" fill="#2D1A0C"/>
  <!-- bras vers poignée -->
  <path d="M178 192 Q216 200 244 222 L236 238 Q210 220 172 210Z" fill="#15202A"/>

  <!-- ─── Superviseur (droite, gilet) ─── -->
  <path d="M342 252 L336 322 L356 322 L362 256Z" fill="#1D2B33"/>
  <path d="M382 252 L388 322 L408 322 L400 256Z" fill="#1D2B33"/>
  <rect x="330" y="318" width="30" height="11" rx="5" fill="#15100A"/>
  <rect x="382" y="318" width="30" height="11" rx="5" fill="#15100A"/>
  <!-- gilet -->
  <path d="M338 178 Q330 222 342 258 L404 258 Q414 220 408 178 Q390 162 372 162 Q354 162 338 178Z" fill="#E0A33E"/>
  <rect x="342" y="212" width="62" height="8" fill="#F6F8F9"/>
  <path d="M364 164 L372 180 L380 164Z" fill="#0E8FA8"/>
  <!-- tête -->
  <circle cx="372" cy="132" r="26" fill="#5C3318"/>
  <!-- casque -->
  <path d="M344 126 Q344 98 372 96 Q400 98 400 126 L396 126 Q394 106 372 105 Q350 106 348 126Z" fill="#18B7D2"/>
  <rect x="341" y="122" width="62" height="9" rx="4.5" fill="#0E8FA8"/>
  <path d="M361 144 Q372 152 383 144" stroke="#2D1A0C" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <circle cx="362" cy="132" r="2.5" fill="#2D1A0C"/>
  <circle cx="382" cy="132" r="2.5" fill="#2D1A0C"/>
  <!-- bras vers poignée -->
  <path d="M342 192 Q304 200 276 222 L284 238 Q310 220 348 210Z" fill="#E0A33E"/>

  <!-- ─── Poignée de main ─── -->
  <ellipse cx="260" cy="230" rx="24" ry="15" fill="#7A4A28"/>
  <ellipse cx="252" cy="226" rx="14" ry="10" fill="#5C3318"/>
  <circle cx="260" cy="230" r="34" fill="none" stroke="#18B7D2" stroke-width="2.5" stroke-dasharray="5 6" opacity=".55"/>

  <!-- Badge engagement -->
  <g transform="translate(186 332)">
    <rect x="0" y="0" width="148" height="40" rx="20" fill="#FFFFFF" stroke="#E4E8EA"/>
    <circle cx="21" cy="20" r="12" fill="#0E8FA8"/>
    <path d="M21 12.5 L28 16 V21.5 Q28 27 21 29 Q14 27 14 21.5 V16Z" fill="#fff"/>
    <text x="40" y="17" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#16181A">Engagement écrit</text>
    <text x="40" y="29" font-family="Arial, sans-serif" font-size="8.5" fill="#6E757B">contrat + PV de réception</text>
  </g>
</svg>
